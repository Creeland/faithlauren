<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1c1917" />
<title>Faith Lauren Studio — Codebase World</title>
<style>
  :root {
    --bg: #faf8f5;
    --bg-2: #f2ede6;
    --ink: #1c1917;
    --stone: #57534e;
    --stone-2: #78716c;
    --line: #e7e1d8;
    --accent: #b08968;
    --accent-2: #9a7355;
    --accent-soft: #f4ece4;
    --good: #4d7c5a;
    --warn: #b45309;
    --card: #ffffff;
    --shadow: 0 1px 2px rgba(28,25,23,.06), 0 8px 24px rgba(28,25,23,.06);
    --radius: 16px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }
  .app {
    max-width: 720px;
    margin: 0 auto;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* Top bar */
  header.bar {
    position: sticky; top: 0; z-index: 40;
    background: rgba(250,248,245,.88);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
    padding: max(10px, env(safe-area-inset-top)) 16px 10px;
  }
  .bar-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .brand { font-size: 13px; letter-spacing: .28em; text-transform: uppercase; font-weight: 400; color: var(--ink); }
  .brand small { display:block; letter-spacing:.12em; font-size:9.5px; color: var(--stone-2); margin-top:2px;}
  .xp-wrap { flex: 1; max-width: 190px; }
  .xp-track { height: 8px; background: var(--bg-2); border-radius: 99px; overflow: hidden; border: 1px solid var(--line); }
  .xp-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width .5s cubic-bezier(.2,.8,.2,1); }
  .xp-label { font-size: 10px; color: var(--stone-2); text-align: right; margin-top: 3px; letter-spacing:.04em; }

  main { flex: 1; padding: 18px 16px 120px; }

  h1.title { font-size: 26px; font-weight: 300; letter-spacing: -.01em; margin: 4px 0 8px; }
  .lead { color: var(--stone); font-size: 15px; margin: 0 0 18px; }

  /* Map / zone grid */
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  @media (max-width: 380px){ .grid { grid-template-columns: 1fr; } }

  .zone {
    position: relative;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 14px 14px;
    text-align: left;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: transform .12s ease, border-color .2s;
    overflow: hidden;
    min-height: 128px;
    display: flex; flex-direction: column;
  }
  .zone:active { transform: scale(.975); }
  .zone .emoji { font-size: 26px; margin-bottom: 8px; }
  .zone h3 { margin: 0 0 3px; font-size: 15px; font-weight: 600; letter-spacing: -.01em; }
  .zone p { margin: 0; font-size: 12px; color: var(--stone-2); }
  .zone .tick {
    position: absolute; top: 12px; right: 12px;
    width: 22px; height: 22px; border-radius: 99px;
    background: var(--good); color: #fff; font-size: 13px;
    display: none; align-items: center; justify-content: center;
  }
  .zone.done .tick { display: flex; }
  .zone.done { border-color: #cfe0d3; }
  .zone .pathtag { margin-top: auto; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 10px; color: var(--accent-2); padding-top:10px; }

  .section-h { font-size: 12px; letter-spacing: .22em; text-transform: uppercase; color: var(--stone-2); margin: 26px 0 12px; }

  /* Trace cards */
  .trace-card {
    background: linear-gradient(160deg, var(--card), var(--accent-soft));
    border: 1px solid var(--line); border-radius: var(--radius);
    padding: 15px 15px; margin-bottom: 12px; cursor: pointer;
    box-shadow: var(--shadow); transition: transform .12s;
    display:flex; align-items:center; gap:13px;
  }
  .trace-card:active { transform: scale(.98); }
  .trace-card .t-emoji { font-size: 24px; }
  .trace-card h3 { margin: 0 0 2px; font-size: 15px; font-weight: 600; }
  .trace-card p { margin: 0; font-size: 12px; color: var(--stone-2); }
  .trace-card .arrow { margin-left:auto; color: var(--accent); font-size: 20px; }

  /* Overlay / detail sheet */
  .sheet-backdrop {
    position: fixed; inset: 0; z-index: 60;
    background: rgba(28,25,23,.42);
    opacity: 0; pointer-events: none; transition: opacity .28s;
    backdrop-filter: blur(2px);
  }
  .sheet-backdrop.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 61;
    max-width: 720px; margin: 0 auto;
    background: var(--bg);
    border-radius: 22px 22px 0 0;
    max-height: 92svh; height: 92svh;
    transform: translateY(100%);
    transition: transform .34s cubic-bezier(.2,.85,.25,1);
    display: flex; flex-direction: column;
    box-shadow: 0 -10px 40px rgba(0,0,0,.2);
  }
  .sheet.open { transform: translateY(0); }
  .sheet-grab { padding: 10px 0 4px; display: flex; justify-content: center; flex: 0 0 auto; }
  .sheet-grab span { width: 40px; height: 5px; border-radius: 99px; background: var(--line); }
  .sheet-head {
    padding: 4px 20px 12px; border-bottom: 1px solid var(--line);
    display: flex; align-items: flex-start; gap: 12px; flex: 0 0 auto;
  }
  .sheet-head .big { font-size: 30px; line-height:1; }
  .sheet-head h2 { margin: 2px 0 3px; font-size: 20px; font-weight: 500; }
  .sheet-head .sub { font-size: 12px; color: var(--stone-2); font-family: ui-monospace, Menlo, monospace; }
  .sheet-close {
    margin-left: auto; flex: 0 0 auto;
    width: 34px; height: 34px; border-radius: 99px; border: 1px solid var(--line);
    background: var(--card); font-size: 17px; color: var(--stone); cursor: pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .sheet-body { overflow-y: auto; padding: 18px 20px calc(40px + env(safe-area-inset-bottom)); -webkit-overflow-scrolling: touch; }

  .lore { font-size: 15px; color: var(--ink); margin: 0 0 18px; }
  .lore em { color: var(--accent-2); font-style: normal; font-weight: 600; }

  .block-h { font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: var(--stone-2); margin: 22px 0 10px; display:flex; align-items:center; gap:8px;}
  .block-h::before { content:""; width:14px; height:1px; background: var(--accent); }

  ul.files { list-style: none; padding: 0; margin: 0; }
  ul.files li {
    background: var(--card); border: 1px solid var(--line); border-radius: 11px;
    padding: 10px 12px; margin-bottom: 8px;
    font-family: ui-monospace, Menlo, monospace; font-size: 12px;
  }
  ul.files li b { color: var(--accent-2); font-weight: 600; }
  ul.files li span { display:block; font-family: ui-sans-serif, system-ui, sans-serif; font-size: 12px; color: var(--stone-2); margin-top: 3px; }

  .flow { margin: 4px 0 6px; }
  .flow-step {
    display: flex; gap: 12px; padding: 0 0 2px;
  }
  .flow-num {
    flex: 0 0 auto; width: 26px; height: 26px; border-radius: 99px;
    background: var(--accent-soft); color: var(--accent-2); border: 1px solid #e6d8c9;
    font-size: 12px; font-weight: 700; display:flex; align-items:center; justify-content:center;
    position: relative; z-index: 1;
  }
  .flow-line { position: relative; }
  .flow-line::before {
    content:""; position:absolute; left: 12px; top: 26px; bottom: -6px; width: 2px; background: var(--line);
  }
  .flow-step:last-child .flow-line::before { display:none; }
  .flow-txt { padding: 1px 0 16px; font-size: 13.5px; color: var(--ink); }
  .flow-txt code { background: var(--bg-2); padding: 1px 5px; border-radius: 5px; font-size: 11.5px; color: var(--accent-2); }

  /* Quest / quiz */
  .quest {
    margin-top: 22px; background: var(--card); border: 1px solid var(--line);
    border-radius: 14px; padding: 16px; box-shadow: var(--shadow);
  }
  .quest .q-label { font-size: 10.5px; letter-spacing:.16em; text-transform:uppercase; color: var(--accent-2); font-weight:700; }
  .quest .q { font-size: 15px; font-weight: 500; margin: 6px 0 14px; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: var(--bg); border: 1px solid var(--line); border-radius: 10px;
    padding: 12px 13px; margin-bottom: 9px; font-size: 13.5px; color: var(--ink);
    cursor: pointer; transition: border-color .15s, background .15s;
  }
  .opt:active { background: var(--bg-2); }
  .opt.correct { border-color: var(--good); background: #eef5ef; color: #2f5d3a; font-weight:500; }
  .opt.wrong { border-color: #d99; background: #fbeeee; color: #8a3a3a; }
  .opt:disabled { cursor: default; }
  .q-feedback { font-size: 13px; margin-top: 4px; padding: 10px 12px; border-radius: 9px; display:none; }
  .q-feedback.show { display: block; }
  .q-feedback.ok { background: #eef5ef; color: #2f5d3a; }
  .q-feedback.no { background: #fbeeee; color: #8a3a3a; }

  .btn {
    display:block; width:100%; text-align:center;
    background: var(--ink); color: #fff; border: none; border-radius: 12px;
    padding: 15px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 20px;
    letter-spacing: .02em;
  }
  .btn:active { opacity: .85; }
  .btn.ghost { background: var(--card); color: var(--ink); border: 1px solid var(--line); }

  /* Trace player */
  .trace-progress { display:flex; gap:5px; margin: 2px 0 18px; }
  .trace-progress i { flex:1; height: 4px; border-radius: 99px; background: var(--line); transition: background .3s; }
  .trace-progress i.on { background: var(--accent); }
  .trace-stage { animation: fade .3s ease; }
  @keyframes fade { from { opacity:0; transform: translateY(6px);} to {opacity:1; transform:none;} }
  .trace-stage .stage-emoji { font-size: 40px; margin-bottom: 6px; }
  .trace-stage h3 { font-size: 19px; font-weight: 500; margin: 0 0 4px; }
  .trace-stage .where { font-family: ui-monospace, Menlo, monospace; font-size: 11.5px; color: var(--accent-2); margin-bottom: 12px; }
  .trace-stage p { font-size: 14.5px; color: var(--ink); margin: 0 0 12px; }
  .trace-stage .snippet {
    background: #1c1917; color: #e7e1d8; border-radius: 12px; padding: 13px 14px;
    font-family: ui-monospace, Menlo, monospace; font-size: 11.5px; line-height: 1.65;
    overflow-x: auto; white-space: pre; -webkit-overflow-scrolling: touch;
  }
  .trace-stage .snippet .k { color: #d8a877; }
  .trace-stage .snippet .c { color: #7d8f7a; }
  .trace-stage .snippet .s { color: #c8a2a2; }
  .trace-nav { display:flex; gap: 10px; margin-top: 20px; }
  .trace-nav button { flex:1; }

  /* Intro */
  .intro-hero {
    border-radius: var(--radius); overflow: hidden; margin-bottom: 18px;
    background: linear-gradient(150deg, #2a2622, #4a3f36 60%, var(--accent-2));
    color: #f5efe8; padding: 26px 20px 24px; position: relative;
  }
  .intro-hero .kicker { font-size: 10.5px; letter-spacing:.3em; text-transform:uppercase; opacity:.75; }
  .intro-hero h1 { font-size: 27px; font-weight: 300; margin: 8px 0 8px; line-height:1.15; }
  .intro-hero p { font-size: 14px; opacity:.9; margin:0; }
  .chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:14px; }
  .chip { font-size:10.5px; background: rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.2); padding:4px 9px; border-radius:99px; letter-spacing:.03em; }

  .mini-legend { display:flex; gap:14px; flex-wrap:wrap; font-size:12px; color:var(--stone-2); margin: 4px 0 2px; }
  .mini-legend span { display:flex; align-items:center; gap:5px; }
  .dot { width:9px;height:9px;border-radius:99px;display:inline-block; }

  .reset { text-align:center; margin-top: 28px; }
  .reset button { background:none; border:none; color: var(--stone-2); font-size:12px; text-decoration: underline; cursor:pointer; }

  .toast {
    position: fixed; left:50%; bottom: 26px; transform: translate(-50%, 20px);
    background: var(--ink); color:#fff; padding: 11px 18px; border-radius: 99px;
    font-size: 13px; opacity: 0; pointer-events:none; transition: all .3s; z-index: 80;
    box-shadow: 0 8px 24px rgba(0,0,0,.25); max-width: 90%;
  }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }
</style>
</head>
<body>
<div class="app">
  <header class="bar">
    <div class="bar-row">
      <div class="brand">Faith Lauren<small>codebase world</small></div>
      <div class="xp-wrap">
        <div class="xp-track"><div class="xp-fill" id="xpFill"></div></div>
        <div class="xp-label" id="xpLabel">0 / 0 explored</div>
      </div>
    </div>
  </header>

  <main id="main"></main>
</div>

<div class="sheet-backdrop" id="backdrop"></div>
<div class="sheet" id="sheet">
  <div class="sheet-grab"><span></span></div>
  <div class="sheet-head">
    <div class="big" id="sheetEmoji">📍</div>
    <div>
      <h2 id="sheetTitle">Zone</h2>
      <div class="sub" id="sheetSub">path</div>
    </div>
    <button class="sheet-close" id="sheetClose" aria-label="Close">✕</button>
  </div>
  <div class="sheet-body" id="sheetBody"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   DATA — the codebase, told as an explorable world.
   Everything here maps to real files/flows in the repo.
   ============================================================ */

const ZONES = [
  {
    id: "lawn",
    emoji: "🌿",
    name: "The Front Lawn",
    tag: "src/app/page.tsx",
    blurb: "Where every visitor arrives.",
    lore: "This is the public homepage — the first thing a potential client sees. It's a <em>Server Component</em>: it runs on the server, greets you with a full-viewport hero, then queries the database for a <em>“Selected Work”</em> grid and ends with a booking form. No client to your machine until it hands you finished HTML.",
    files: [
      { f: "src/app/page.tsx", d: "The homepage. Queries PortfolioGroups that have photos + a cover image, renders hero, work grid, about & contact." },
      { f: "src/app/layout.tsx", d: "Root layout — fonts, global chrome wrapping every page." },
      { f: "src/app/mobile-menu.tsx / reveal.tsx", d: "Client components for the nav menu and scroll-reveal animations." },
      { f: "src/app/booking-form.tsx", d: "The contact form that feeds the Booking table." },
    ],
    flow: [
      "A visitor requests <code>/</code>. Next.js runs <code>Home()</code> on the server.",
      "It calls <code>auth()</code> (to show an Admin link if you're logged in) and <code>prisma.portfolioGroup.findMany()</code>.",
      "Only groups that <code>have some portfolios</code> AND a <code>coverImageUrl</code> make the grid — empties are hidden.",
      "Each group card links to <code>/portfolio/[slug]</code>. Finished HTML ships to the phone.",
    ],
    quest: {
      q: "Why might a PortfolioGroup you created NOT show up in the homepage 'Selected Work' grid?",
      opts: [
        { t: "It has no cover image or no portfolios inside it", ok: true },
        { t: "It was created less than 24 hours ago" },
        { t: "You're not logged in as admin" },
      ],
      why: "The query filters on <code>portfolios: { some: {} }</code> and <code>coverImageUrl: { not: null }</code>. Empty or cover-less groups are excluded."
    }
  },
  {
    id: "portfolio",
    emoji: "🖼️",
    name: "The Portfolio Wing",
    tag: "src/app/portfolio/[groupSlug]/…",
    blurb: "Public galleries of work, nested.",
    lore: "The public body of work is organized in three tiers: <em>PortfolioGroup → Portfolio → PortfolioPhoto</em>. Groups are the categories on the front page; tap one to see its portfolios, tap a portfolio to see its photos. The URLs are nested to match: <code>/portfolio/weddings/emma-and-sam</code>.",
    files: [
      { f: "portfolio/[groupSlug]/page.tsx", d: "Lists the portfolios inside one group." },
      { f: "portfolio/[groupSlug]/[portfolioSlug]/page.tsx", d: "Shows the photos of a single portfolio." },
    ],
    flow: [
      "Front page links to a group by its <code>slug</code>.",
      "The group page loads that group + its portfolios from Prisma, ordered by <code>sortOrder</code>.",
      "Each portfolio links deeper to <code>[groupSlug]/[portfolioSlug]</code>.",
      "That leaf page renders <code>PortfolioPhoto</code> rows in <code>sortOrder</code>.",
    ],
    quest: {
      q: "How deep is the public portfolio hierarchy?",
      opts: [
        { t: "Three levels: Group → Portfolio → Photo", ok: true },
        { t: "Two levels: Gallery → Photo" },
        { t: "One flat list of images" },
      ],
      why: "The schema chains <code>PortfolioGroup</code> → <code>Portfolio</code> → <code>PortfolioPhoto</code>, and the routes mirror that nesting."
    }
  },
  {
    id: "vault",
    emoji: "🔐",
    name: "The Gallery Vault",
    tag: "src/app/gallery/[slug]",
    blurb: "Password-protected client deliveries.",
    lore: "Separate from the public portfolio: this is how finished photos are <em>delivered privately to a client</em>. Each <em>Gallery</em> has a randomly generated password. The client opens a link, types the password once, and a signed cookie remembers them for 30 days. Inside, they browse a lightbox, select favorites, and download a ZIP.",
    files: [
      { f: "gallery/[slug]/page.tsx", d: "Server component: loads the gallery, checks the access cookie, gates on the password form." },
      { f: "gallery/[slug]/password-form.tsx", d: "Client form that posts to verifyAlbumPassword." },
      { f: "gallery/[slug]/gallery-client.tsx / lightbox.tsx", d: "The interactive viewer + selection UI." },
      { f: "api/gallery/[slug]/download/route.ts", d: "Streams selected photos as a ZIP (archiver)." },
      { f: "actions/gallery.ts → verifyAlbumPassword", d: "Checks the password, sets an httpOnly cookie." },
    ],
    flow: [
      "Client visits <code>/gallery/emma-wedding</code>. The page reads cookie <code>gallery-emma-wedding-access</code>.",
      "No cookie → render the password form instead of photos.",
      "They submit; <code>verifyAlbumPassword()</code> compares against <code>gallery.password</code>.",
      "Match → set an <code>httpOnly</code>, <code>sameSite: lax</code> cookie for 30 days, then revalidate the page.",
      "Now the cookie exists → the full <code>GalleryClient</code> with lightbox + ZIP download renders.",
    ],
    quest: {
      q: "How does the gallery remember that a client already entered the password?",
      opts: [
        { t: "A 30-day httpOnly cookie named per-gallery slug", ok: true },
        { t: "Their IP address is whitelisted" },
        { t: "A NextAuth login session, same as admins" },
      ],
      why: "<code>verifyAlbumPassword</code> sets <code>gallery-&lt;slug&gt;-access = granted</code> as an httpOnly cookie with <code>maxAge</code> of 30 days. Clients are NOT NextAuth users."
    }
  },
  {
    id: "studio",
    emoji: "🎛️",
    name: "The Admin Studio",
    tag: "src/app/admin/*",
    blurb: "The photographer's control room.",
    lore: "Behind the login lives the CMS. Faith manages everything here: create galleries, build portfolios & groups, upload and <em>drag-to-reorder</em> photos, and triage incoming <em>Bookings</em>. Every admin page is guarded twice — by middleware at the edge and by <code>verifyAdmin()</code> inside the page.",
    files: [
      { f: "admin/layout.tsx / mobile-nav.tsx", d: "Shell + navigation for the whole admin area." },
      { f: "admin/galleries, /portfolios, /portfolio-groups", d: "CRUD screens for each content type, with new/[id] sub-routes." },
      { f: "admin/bookings", d: "Inbox of session requests with a status workflow." },
      { f: "…/reorder-photos.ts + use-admin-photo-selection.ts", d: "The drag-and-drop reordering logic (dnd-kit), with tests." },
    ],
    flow: [
      "Request hits <code>/admin/...</code>. First <code>proxy.ts</code> (middleware) checks for a session.",
      "No session → redirect to <code>/login</code> before the page even renders.",
      "Inside the page, <code>verifyAdmin()</code> from <code>lib/dal.ts</code> re-checks role === 'ADMIN'.",
      "Mutations go through <code>app/actions/*</code> server actions, each starting with <code>await verifyAdmin()</code>.",
    ],
    quest: {
      q: "Admin routes are protected in TWO places. Why belt-and-suspenders?",
      opts: [
        { t: "Middleware guards navigation; verifyAdmin() guards data/mutations even if middleware is bypassed", ok: true },
        { t: "One is for mobile, one is for desktop" },
        { t: "It's redundant/accidental and should be removed" },
      ],
      why: "Middleware (<code>proxy.ts</code>) redirects at the edge, but server actions can be invoked directly — so each action also calls <code>verifyAdmin()</code>. Defense in depth."
    }
  },
  {
    id: "darkroom",
    emoji: "🧪",
    name: "The Darkroom",
    tag: "src/app/api/uploadthing/core.ts",
    blurb: "Where uploaded photos are developed.",
    lore: "The upload pipeline. Photos don't touch the server's disk — they go to <em>UploadThing</em>. This file defines three routers (gallery photos, portfolio photos, group covers). Each checks you're an admin, records the photo in a <em>transaction</em> with the next <code>sortOrder</code>, revalidates the right pages, and then — without blocking your upload — quietly backfills width & height with <em>sharp</em>.",
    files: [
      { f: "api/uploadthing/core.ts", d: "The FileRouter: galleryPhoto, portfolioPhoto, groupCoverImage." },
      { f: "api/uploadthing/route.ts", d: "Wires the router into a Next.js route handler." },
      { f: "lib/uploadthing.ts + hooks/use-upload-queue.ts", d: "Client helpers + a resilient upload queue (with tests)." },
    ],
    flow: [
      "Admin drops files. UploadThing’s <code>.middleware()</code> runs — rejects anyone whose role isn't ADMIN.",
      "File lands in cloud storage; <code>.onUploadComplete()</code> fires on the server.",
      "In a <code>prisma.$transaction</code>, it reads the current <code>max(sortOrder)</code> and inserts the new photo at <code>max + 1</code>.",
      "It calls <code>revalidatePath()</code> for the public page AND the admin page so both refresh.",
      "Then it <code>import('sharp')</code> lazily, fetches the image, reads dimensions, and updates the row — all fire-and-forget so the response isn't delayed.",
    ],
    quest: {
      q: "Why are image width/height read with sharp in a fire-and-forget block instead of before responding?",
      opts: [

/* ============================================================
   STATE + RENDER
   ============================================================ */
const KEY = "fl-codebase-world-v1";
let state = load();

function load(){ try { return JSON.parse(localStorage.getItem(KEY)) || {visited:[], quests:[]}; } catch(e){ return {visited:[], quests:[]}; } }
function save(){ try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e){} }

const totalGoals = ZONES.length + ZONES.length; // visit + quest per zone
function progress(){
  const v = new Set(state.visited).size;
  const q = new Set(state.quests).size;
  return { done: v + q, total: totalGoals, zonesVisited: v, questsDone: q };
}
function updateXP(){
  const p = progress();
  document.getElementById("xpFill").style.width = (p.done/p.total*100) + "%";
  document.getElementById("xpLabel").textContent =
    p.zonesVisited + "/" + ZONES.length + " zones · " + p.questsDone + "/" + ZONES.length + " quests";
}

const main = document.getElementById("main");
function renderHub(){
  const p = progress();
  const complete = p.done === p.total;
  main.innerHTML = `
    <div class="intro-hero">
      <div class="kicker">Interactive Field Guide</div>
      <h1>Explore the studio, one room at a time.</h1>
      <p>${complete ? "You've explored every room and passed every quest. Legend. 🏆" : "Tap a zone to learn what lives there, trace how real requests flow, and test yourself. Progress saves on this device."}</p>
      <div class="chips">
        <span class="chip">Next.js 16</span><span class="chip">React 19</span>
        <span class="chip">Prisma · SQLite</span><span class="chip">NextAuth</span>
        <span class="chip">UploadThing</span><span class="chip">Tailwind v4</span>
      </div>
    </div>

    <div class="mini-legend">
      <span><i class="dot" style="background:var(--accent)"></i> tap to enter</span>
      <span><i class="dot" style="background:var(--good)"></i> quest passed</span>
    </div>

    <div class="section-h">The Grounds — ${p.zonesVisited}/${ZONES.length} explored</div>
    <div class="grid" id="zoneGrid"></div>

    <div class="section-h">Trace a Journey</div>
    <div id="traceList"></div>

    <div class="reset"><button id="resetBtn">Reset my progress</button></div>
  `;

  const grid = document.getElementById("zoneGrid");
  ZONES.forEach(z => {
    const done = state.quests.includes(z.id);
    const visited = state.visited.includes(z.id);
    const el = document.createElement("button");
    el.className = "zone" + (done ? " done" : "");
    el.innerHTML = `
      <div class="tick">✓</div>
      <div class="emoji">${z.emoji}</div>
      <h3>${z.name}</h3>
      <p>${z.blurb}</p>
      <div class="pathtag">${visited && !done ? "▸ visited" : z.tag}</div>`;
    el.onclick = () => openZone(z);
    grid.appendChild(el);
  });

  const tl = document.getElementById("traceList");
  TRACES.forEach(t => {
    const el = document.createElement("div");
    el.className = "trace-card";
    el.innerHTML = `<div class="t-emoji">${t.emoji}</div>
      <div><h3>${t.name}</h3><p>${t.sub}</p></div>
      <div class="arrow">›</div>`;
    el.onclick = () => openTrace(t);
    tl.appendChild(el);
  });

  document.getElementById("resetBtn").onclick = () => {
    state = {visited:[], quests:[]}; save(); updateXP(); renderHub();
    toast("Progress reset");
  };
  updateXP();
}

/* ---- Zone sheet ---- */
const sheet = document.getElementById("sheet");
const backdrop = document.getElementById("backdrop");
const sheetBody = document.getElementById("sheetBody");

function openSheet(){ sheet.classList.add("open"); backdrop.classList.add("open"); document.body.style.overflow="hidden"; }
function closeSheet(){ sheet.classList.remove("open"); backdrop.classList.remove("open"); document.body.style.overflow=""; }
document.getElementById("sheetClose").onclick = closeSheet;
backdrop.onclick = closeSheet;

function openZone(z){
  if(!state.visited.includes(z.id)){ state.visited.push(z.id); save(); }
  document.getElementById("sheetEmoji").textContent = z.emoji;
  document.getElementById("sheetTitle").textContent = z.name;
  document.getElementById("sheetSub").textContent = z.tag;

  let flowHtml = z.flow.map((s,i)=>`
    <div class="flow-step">
      <div class="flow-line"><div class="flow-num">${i+1}</div></div>
      <div class="flow-txt">${s}</div>
    </div>`).join("");

  let filesHtml = z.files.map(f=>`<li><b>${f.f}</b><span>${f.d}</span></li>`).join("");

  sheetBody.innerHTML = `
    <p class="lore">${z.lore}</p>
    <div class="block-h">What lives here</div>
    <ul class="files">${filesHtml}</ul>
    <div class="block-h">How it flows</div>
    <div class="flow">${flowHtml}</div>
    <div class="quest" id="quest"></div>
  `;
  renderQuest(z);
  sheetBody.scrollTop = 0;
  openSheet();
  updateXP();
  renderHub(); // reflect "visited" underneath
}

function renderQuest(z){
  const host = document.getElementById("quest");
  const already = state.quests.includes(z.id);
  const optsHtml = z.quest.opts.map((o,i)=>`<button class="opt" data-i="${i}" ${already?"disabled":""}>${o.t}</button>`).join("");
  host.innerHTML = `
    <div class="q-label">Quest · Test your understanding</div>
    <div class="q">${z.quest.q}</div>
    <div id="opts">${optsHtml}</div>
    <div class="q-feedback ${already?'ok show':''}" id="qfb">${already?('✓ '+z.quest.why):''}</div>
  `;
  if(already){
    // reveal correct styling
    [...host.querySelectorAll(".opt")].forEach((b,i)=>{ if(z.quest.opts[i].ok) b.classList.add("correct"); });
    return;
  }
  host.querySelectorAll(".opt").forEach(btn=>{
    btn.onclick = ()=>{
      const i = +btn.dataset.i;
      const correct = z.quest.opts[i].ok;
      host.querySelectorAll(".opt").forEach(b=>b.disabled=true);
      const fb = document.getElementById("qfb");
      if(correct){
        btn.classList.add("correct");
        fb.className = "q-feedback ok show"; fb.innerHTML = "✓ " + z.quest.why;
        if(!state.quests.includes(z.id)){ state.quests.push(z.id); save(); toast("Quest passed ✓ +XP"); }
        updateXP();
      } else {
        btn.classList.add("wrong");
        [...host.querySelectorAll(".opt")].forEach((b,j)=>{ if(z.quest.opts[j].ok) b.classList.add("correct"); });
        fb.className = "q-feedback no show"; fb.innerHTML = "Not quite. " + z.quest.why;
      }
    };
  });
}

/* ---- Trace player ---- */
function openTrace(t){
  document.getElementById("sheetEmoji").textContent = t.emoji;
  document.getElementById("sheetTitle").textContent = t.name;
  document.getElementById("sheetSub").textContent = t.sub;
  let idx = 0;
  function draw(){
    const s = t.stages[idx];
    const dots = t.stages.map((_,i)=>`<i class="${i<=idx?'on':''}"></i>`).join("");
    sheetBody.innerHTML = `
      <div class="trace-progress">${dots}</div>
      <div class="trace-stage">
        <div class="stage-emoji">${s.emoji}</div>
        <h3>${s.h}</h3>
        <div class="where">${s.where}</div>
        <p>${s.p}</p>
        <div class="snippet">${s.code}</div>
      </div>
      <div class="trace-nav">
        <button class="btn ghost" id="tPrev" ${idx===0?'disabled style="opacity:.4"':''}>Back</button>
        <button class="btn" id="tNext">${idx===t.stages.length-1?'Finish':'Next step ›'}</button>
      </div>
      <div style="text-align:center;color:var(--stone-2);font-size:12px;margin-top:14px">Step ${idx+1} of ${t.stages.length}</div>
    `;
    document.getElementById("tPrev").onclick = ()=>{ if(idx>0){idx--;draw();} };
    document.getElementById("tNext").onclick = ()=>{
      if(idx<t.stages.length-1){ idx++; draw(); sheetBody.scrollTop=0; }
      else { closeSheet(); toast("Journey traced 🗺️"); }
    };
    sheetBody.scrollTop = 0;
  }
  draw();
  openSheet();
}

function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>t.classList.remove("show"), 1900);
}

renderHub();
</script>
